          Required: true
      IncludeCompanySignature: true
      Content: |
        This Community Agreement ("Agreement") is entered into between Habla Espanol LLC ("Company") and the undersigned member ("Member").
        
        ## 1. COMMUNITY RULES AND CONDUCT
        
        Member agrees to:
        
        - Treat all members with respect and encouragement
        - Practice Spanish in good faith, embracing mistakes as part of learning
        - Maintain a supportive, judgment-free environment
        - Not spam, solicit, or promote unrelated products or services
        - Report any disrespectful behavior
        
        Violation may result in removal without refund.
        
        ## 2. EDUCATIONAL DISCLAIMER
        
        Member acknowledges:
        
        - Results vary based on individual effort and consistency
        - Company does not guarantee any specific level of fluency
        - Member is responsible for their own practice and commitment
        - The program provides tools and guidance, but success requires daily effort
        
        ## 3. ACKNOWLEDGMENT
        
        By signing, Member acknowledges they have read and agree to all terms.
        
        ---
        
        **Member Signature:**

