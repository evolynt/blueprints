    Type: Evolynt::CRM::Agreement
    Properties:
      Name: "Coaching Agreement"
      Title: "SPANISH MASTERY COACHING AGREEMENT"
      SignatureType: typed
      CollectFields:
        - Field: initials
          Required: true
      IncludeCompanySignature: true
      Content: |
        This Coaching Agreement ("Agreement") is entered into between Habla Espanol LLC ("Coach") and the undersigned client ("Client").
        
        ## 1. COACHING SCOPE
        
        Coach agrees to provide:
        
        - 12 private coaching sessions (45 minutes each)
        - Personalized study plan and curriculum
        - Community access and group practice sessions
        - Resource library access
        - Email support between sessions
        
        Sessions must be used within 120 days of purchase.
        
        ## 2. CLIENT EXPECTATIONS
        
        Client agrees to:
        
        - Practice Spanish daily (minimum 30 minutes)
        - Come prepared to sessions with questions and practice updates
        - Complete assigned exercises between sessions
        - Communicate scheduling needs with 24-hour notice
        - Actively participate in the community
        
        ## 3. PAYMENT AND REFUND TERMS
        
        - Payment is required before the first session
        - Coaching fees are non-refundable once sessions begin
        - Client must provide 24-hour notice to reschedule
        - Missed sessions without notice cannot be rescheduled
        
        ## 4. DISCLAIMER
        
        Client acknowledges:
        
        - Results depend on individual effort and commitment
        - Coach does not guarantee any specific fluency level
        - Consistent daily practice is essential for progress
        
        ---
        
        **Client Signature:**

