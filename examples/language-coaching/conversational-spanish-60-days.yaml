  # ============================================
  # 📧 EMAIL TEMPLATES
  # ============================================
  spanish-email-starter-welcome:
    Type: Evolynt::Automation::EmailTemplate
    Properties:
      Name: "Starter Welcome"
      Subject: "Your Spanish Starter Kit is ready"
      Elements:
        - Type: headline
          Order: 1
          Content:
            Text: "Your Starter Kit is Ready!"
        - Type: text
          Order: 2
          Content:
            Text: |
              Hi {{contact.name}},
              
              Thanks for getting the Spanish Starter Kit! You just took 
              the first step toward speaking Spanish.
              
              **Here is how to get started right now:**
              
              1. Log into your portal
              2. Download the Pronunciation Cheat Sheet
              3. Learn your first 5 phrases
              4. Say them OUT LOUD (this is essential!)
              
              Remember: reading silently does not build speaking skills. 
              From this moment on, everything you learn in Spanish, say 
              it out loud.
        - Type: button
          Order: 3
          Content:
            Text: "Access Your Starter Kit"
            LinkUrl: "{{portal.url}}"
        - Type: text
          Order: 4
          Content:
            Text: |
              Nos vemos!
              
              - Habla Espanol
        - Type: divider
          Order: 5
        - Type: text
          Order: 6
          Content:
            Text: "{{unsubscribe_url}}"

  spanish-email-starter-tip1:
    Type: Evolynt::Automation::EmailTemplate
    Properties:
      Name: "Starter Tip 1"
      Subject: "The #1 mistake new Spanish learners make"
      Elements:
        - Type: headline
          Order: 1
          Content:
            Text: "Avoid This Common Mistake"
        - Type: text
          Order: 2
          Content:
            Text: |
              Hi {{contact.name}},
              
              The biggest mistake? Studying grammar instead of speaking.
              
              You do not need to conjugate verbs perfectly to have a 
              conversation. Native speakers understand you even with 
              mistakes.
              
              **Today's challenge:** Take 3 phrases from your Starter Kit 
              and say them out loud 10 times each. Focus on the sounds, 
              not the rules.
              
              Your mouth needs practice, not your eyes.
        - Type: button
          Order: 3
          Content:
            Text: "Open Your Phrase Guide"
            LinkUrl: "{{portal.url}}"
        - Type: divider
          Order: 4
        - Type: text
          Order: 5
          Content:
            Text: "{{unsubscribe_url}}"

  spanish-email-starter-tip2:
    Type: Evolynt::Automation::EmailTemplate
    Properties:
      Name: "Starter Tip 2"
      Subject: "How to remember vocabulary (without flashcards)"
      Elements:
        - Type: headline
          Order: 1
          Content:
            Text: "Remember More, Forget Less"
        - Type: text
          Order: 2
          Content:
            Text: |
              Hi {{contact.name}},
              
              The secret to remembering Spanish? Use it in context.
              
              Instead of memorizing word lists:
              
              1. Label 10 objects in your house with sticky notes (in Spanish)
              2. Change your phone language to Spanish
              3. Think of 3 things you do every day and say them in Spanish
              
              When you connect words to your real life, they stick.
              
              Try it today!
        - Type: button
          Order: 3
          Content:
            Text: "Review Your Resources"
            LinkUrl: "{{portal.url}}"
        - Type: divider
          Order: 4
        - Type: text
          Order: 5
          Content:
            Text: "{{unsubscribe_url}}"

  spanish-email-starter-tip3:
    Type: Evolynt::Automation::EmailTemplate
    Properties:
      Name: "Starter Tip 3"
      Subject: "The 15-minute daily habit that changes everything"
      Elements:
        - Type: headline
          Order: 1
          Content:
            Text: "The 15-Minute Daily Habit"
        - Type: text
          Order: 2
          Content:
            Text: |
              Hi {{contact.name}},
              
              You do not need hours of study. You need 15 minutes of 
              the RIGHT practice, every single day.
              
              **The 15-Minute Spanish Habit:**
              
              - 5 minutes: Review yesterday's phrases out loud
              - 5 minutes: Learn 3 new phrases from your guide
              - 5 minutes: Listen to a Spanish song or podcast clip
              
              Consistency beats intensity. Every. Single. Time.
              
              Have you been following the Daily Practice Checklist? 
              It is designed exactly for this.
        - Type: button
          Order: 3
          Content:
            Text: "Open Your Checklist"
            LinkUrl: "{{portal.url}}"
        - Type: divider
          Order: 4
        - Type: text
          Order: 5
          Content:
            Text: "{{unsubscribe_url}}"

  spanish-email-starter-upsell:
    Type: Evolynt::Automation::EmailTemplate
    Properties:
      Name: "Starter Upsell"
      Subject: "Want to practice with real people?"
      Elements:
        - Type: headline
          Order: 1
          Content:
            Text: "Ready for Real Practice?"
        - Type: text
          Order: 2
          Content:
            Text: |
              Hi {{contact.name}},
              
              You have been learning phrases for almost two weeks. 
              How is it going?
              
              Here is the truth: learning alone can only take you so far. 
              At some point, you need to practice with real people.
              
              That is why I created the **Habla Community**.
              
              Members get:
              
              - Weekly live conversation practice sessions
              - Daily practice prompts and accountability
              - Study partners at your level
