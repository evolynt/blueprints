  spanish-accelerator-course:
    Type: Evolynt::Commerce::Product
    Properties:
      Name: "60-Day Spanish Fluency Accelerator"
      ProductType: course
      Description: "8-module course taking you from zero to conversational Spanish in 60 days"
      Course:
        Title: "60-Day Spanish Fluency Accelerator"
        Description: "Your complete roadmap to conversational Spanish in just 60 days"
        Modules:
          - Title: "Welcome & Spanish Foundations"
            Order: 1
            Lessons:
              - Title: "Welcome to the Accelerator"
                Order: 1
                ContentType: video
                VideoEmbedUrl: "https://www.youtube.com/embed/HABLA_WELCOME"
              - Title: "How to Use This Course for Maximum Results"
                Order: 2
                ContentType: text
                TextContent: |
                  Welcome to the 60-Day Spanish Fluency Accelerator!
                  
                  Here is how this program works:
                  
                  **The 60-Day Structure:**
                  - 8 modules across 8 weeks (roughly 2-week phases)
                  - Each module builds on the previous one
                  - Do NOT skip ahead. The progression is intentional.
                  
                  **Your Daily Commitment:**
                  - 30 minutes of structured lessons
                  - 15 minutes of speaking practice (out loud!)
                  - 15 minutes of immersion (music, podcasts, or shows)
                  
                  **Keys to Success:**
                  1. Speak out loud from Day 1. Do not just read silently.
                  2. Practice every single day. Consistency beats intensity.
                  3. Post in the community daily for accountability.
                  4. Find a practice partner in the Study Partners space.
                  5. Attend the weekly Q&A calls.
                  
                  **Progress Tracking:**
                  - Record a 30-second video of yourself speaking Spanish on Day 1
                  - Record again at Day 30 and Day 60
                  - You will be amazed at the difference
                  
                  Let's get started!
              - Title: "The Spanish Sound System"
                Order: 3
                ContentType: video
                VideoEmbedUrl: "https://www.youtube.com/embed/HABLA_SOUNDS"
              - Title: "Your First 20 Words"
                Order: 4
                ContentType: video
                VideoEmbedUrl: "https://www.youtube.com/embed/HABLA_FIRST_WORDS"
              - Title: "The Mindset of a Language Learner"
                Order: 5
                ContentType: video
                VideoEmbedUrl: "https://www.youtube.com/embed/HABLA_MINDSET"
          - Title: "Week 1-2: Essential Building Blocks"
            Order: 2
            Lessons:
              - Title: "Greetings & Introductions"
                Order: 1
                ContentType: video
                VideoEmbedUrl: "https://www.youtube.com/embed/HABLA_GREETINGS"
              - Title: "Numbers, Days, and Time"
                Order: 2
                ContentType: video
                VideoEmbedUrl: "https://www.youtube.com/embed/HABLA_NUMBERS"
              - Title: "Essential Verbs: Ser, Estar, Tener, Ir"
                Order: 3
                ContentType: video
                VideoEmbedUrl: "https://www.youtube.com/embed/HABLA_VERBS_1"
              - Title: "Building Simple Sentences"
                Order: 4
                ContentType: video
                VideoEmbedUrl: "https://www.youtube.com/embed/HABLA_SENTENCES"
              - Title: "Practice: Your First Conversation"
                Order: 5
                ContentType: text
                TextContent: |
                  ## Practice Exercise: Your First Conversation
                  
                  **Goal:** Hold a 2-minute conversation introducing yourself
                  
                  **Practice Script:**
                  
                  A: Hola, me llamo [your name]. Mucho gusto.
                  B: Hola, me llamo [name]. Mucho gusto tambien.
                  A: Soy de [your city]. Y tu, de donde eres?
                  B: Soy de [city].
                  A: Que haces? (What do you do?)
                  B: Soy [profession]. Y tu?
                  A: Soy [profession].
                  
                  **Your Assignment:**
                  1. Practice this script out loud 5 times
                  2. Record yourself doing it
                  3. Find a partner in the Study Partners space and practice live
                  4. Post your recording in the Daily Practice space
          - Title: "Week 3-4: Everyday Conversations"
            Order: 3
            Lessons:
              - Title: "Ordering Food & Drinks"
                Order: 1
                ContentType: video
                VideoEmbedUrl: "https://www.youtube.com/embed/HABLA_FOOD"
              - Title: "Asking for Directions"
                Order: 2
                ContentType: video
                VideoEmbedUrl: "https://www.youtube.com/embed/HABLA_DIRECTIONS"
              - Title: "Shopping & Negotiating Prices"
                Order: 3
                ContentType: video
                VideoEmbedUrl: "https://www.youtube.com/embed/HABLA_SHOPPING"
              - Title: "Present Tense Mastery"
                Order: 4
                ContentType: video
                VideoEmbedUrl: "https://www.youtube.com/embed/HABLA_PRESENT_TENSE"
              - Title: "Practice: Real-World Scenarios"
                Order: 5
                ContentType: text
                TextContent: |
                  ## Practice Exercise: Real-World Scenarios
                  
                  **Goal:** Navigate 3 everyday situations entirely in Spanish
                  
                  **Scenario 1: At a Restaurant**
                  Practice ordering a meal, asking about the menu, and requesting the check.
                  
                  **Scenario 2: Getting Directions**
                  Practice asking how to get to the library, the market, and the bus stop.
                  
                  **Scenario 3: At a Store**
                  Practice asking for prices, sizes, and colors.
                  
                  **Your Assignment:**
                  1. Write out your responses for each scenario
                  2. Practice speaking them out loud
                  3. Role-play with a study partner on a video call
                  4. Post about your experience in Daily Practice
          - Title: "Week 5-6: Expanding Your World"
            Order: 4
            Lessons:
              - Title: "Talking About the Past (Preterite)"
                Order: 1
                ContentType: video
                VideoEmbedUrl: "https://www.youtube.com/embed/HABLA_PAST_TENSE"
              - Title: "Talking About the Future"
                Order: 2
                ContentType: video
                VideoEmbedUrl: "https://www.youtube.com/embed/HABLA_FUTURE"
              - Title: "Sharing Opinions & Preferences"
                Order: 3
                ContentType: video
                VideoEmbedUrl: "https://www.youtube.com/embed/HABLA_OPINIONS"
              - Title: "Storytelling in Spanish"
                Order: 4
                ContentType: video
                VideoEmbedUrl: "https://www.youtube.com/embed/HABLA_STORYTELLING"
              - Title: "Practice: Tell Your Story"
                Order: 5
                ContentType: text
                TextContent: |
                  ## Practice Exercise: Tell Your Story
                  
                  **Goal:** Tell a 3-minute story about yourself in Spanish
                  
                  **Structure:**
                  
                  1. **Your past:** Where you grew up, what you studied, a memorable experience
                  2. **Your present:** What you do now, what you enjoy, why you are learning Spanish
                  3. **Your future:** What you want to do, where you want to travel, your goals
                  
                  **Your Assignment:**
                  1. Write out your story (it is okay to look up words)
                  2. Practice telling it without reading
                  3. Record a 3-minute video of yourself telling your story
                  4. Share it in the Wins space. This is a major milestone!
          - Title: "Week 7-8: Real-World Fluency"
            Order: 5
            Lessons:
              - Title: "Phone Calls & Video Chats in Spanish"
                Order: 1
                ContentType: video
                VideoEmbedUrl: "https://www.youtube.com/embed/HABLA_PHONE"
              - Title: "Slang, Fillers, and Sounding Natural"
                Order: 2
                ContentType: video
                VideoEmbedUrl: "https://www.youtube.com/embed/HABLA_SLANG"
              - Title: "Understanding Native Speakers at Full Speed"
                Order: 3
                ContentType: video
                VideoEmbedUrl: "https://www.youtube.com/embed/HABLA_NATIVE_SPEED"
              - Title: "Cultural Context & Regional Differences"
                Order: 4
                ContentType: video
                VideoEmbedUrl: "https://www.youtube.com/embed/HABLA_CULTURE"
              - Title: "Practice: 10-Minute Conversation Challenge"
                Order: 5
                ContentType: text
                TextContent: |
                  ## Practice Exercise: The 10-Minute Conversation Challenge
                  
                  **Goal:** Hold a 10-minute unscripted conversation entirely in Spanish
                  
                  **Rules:**
                  - No English allowed
                  - If you do not know a word, describe it in Spanish
                  - Use filler words (bueno, pues, a ver) to stay in the flow
                  - It is okay to make mistakes. Keep talking.
                  
                  **Suggested Topics:**
                  - Your weekend plans
                  - A trip you took recently
                  - Your favorite movie or show
                  - What you would do with a million dollars
                  
                  **Your Assignment:**
                  1. Find a partner in Study Partners
                  2. Set a timer for 10 minutes
                  3. Talk about anything. Stay in Spanish the entire time.
                  4. Post about the experience in Wins
                  
                  If you can do this, you are conversational. Congratulations!
          - Title: "Immersion Techniques"
            Order: 6
            Lessons:
              - Title: "Building Your Spanish Media Diet"
                Order: 1
                ContentType: video
                VideoEmbedUrl: "https://www.youtube.com/embed/HABLA_MEDIA"
              - Title: "Music & Podcasts for Language Learning"
                Order: 2
                ContentType: video
                VideoEmbedUrl: "https://www.youtube.com/embed/HABLA_MUSIC"
              - Title: "Shows, Movies & YouTube in Spanish"
                Order: 3
                ContentType: video
                VideoEmbedUrl: "https://www.youtube.com/embed/HABLA_SHOWS"
              - Title: "Thinking in Spanish (The Ultimate Skill)"
                Order: 4
                ContentType: video
                VideoEmbedUrl: "https://www.youtube.com/embed/HABLA_THINKING"
          - Title: "Conversation Practice Frameworks"
            Order: 7
            Lessons:
              - Title: "The 5 Conversation Frameworks"
                Order: 1
                ContentType: video
                VideoEmbedUrl: "https://www.youtube.com/embed/HABLA_FRAMEWORKS"
              - Title: "Role-Play Scripts for Every Situation"
                Order: 2
                ContentType: video
                VideoEmbedUrl: "https://www.youtube.com/embed/HABLA_ROLEPLAY"
              - Title: "How to Keep a Conversation Going"
                Order: 3
                ContentType: video
                VideoEmbedUrl: "https://www.youtube.com/embed/HABLA_KEEP_GOING"
              - Title: "Conversation Starters & Icebreakers"
                Order: 4
                ContentType: text
                TextContent: |
                  ## 30 Conversation Starters in Spanish
                  
                  Use these to start conversations with native speakers or practice partners:
                  
                  **Getting to Know Someone:**
                  1. De donde eres? (Where are you from?)
                  2. A que te dedicas? (What do you do for a living?)
                  3. Que te gusta hacer en tu tiempo libre? (What do you like to do in your free time?)
                  4. Tienes hermanos? (Do you have siblings?)
                  5. Cual es tu comida favorita? (What is your favorite food?)
                  
                  **Opinions & Preferences:**
                  6. Que piensas de...? (What do you think about...?)
                  7. Prefieres... o...? (Do you prefer... or...?)
                  8. Cual fue la ultima pelicula que viste? (What was the last movie you watched?)
                  9. Te gusta viajar? A donde? (Do you like to travel? Where?)
                  10. Que tipo de musica te gusta? (What kind of music do you like?)
                  
                  **Deeper Conversations:**
                  11. Si pudieras vivir en cualquier pais, cual seria? (If you could live in any country, which would it be?)
                  12. Cual es tu recuerdo favorito? (What is your favorite memory?)
                  13. Que quieres hacer el proximo ano? (What do you want to do next year?)
                  14. Que es lo mas interesante que has aprendido? (What is the most interesting thing you have learned?)
                  15. Como te describirias en tres palabras? (How would you describe yourself in three words?)
                  
                  **Practice:** Pick 5 of these and practice answering them in Spanish. Then use them with a conversation partner this week.
          - Title: "Maintaining & Growing Your Spanish"
            Order: 8
            Lessons:
              - Title: "Your Post-Program Practice Plan"
                Order: 1
                ContentType: video
                VideoEmbedUrl: "https://www.youtube.com/embed/HABLA_POST_PLAN"
              - Title: "Moving from Conversational to Fluent"
                Order: 2
                ContentType: video
                VideoEmbedUrl: "https://www.youtube.com/embed/HABLA_FLUENT"
              - Title: "Finding Native Speakers to Practice With"
                Order: 3
                ContentType: video
                VideoEmbedUrl: "https://www.youtube.com/embed/HABLA_NATIVE_PRACTICE"
              - Title: "Congratulations & Next Steps"
                Order: 4
                ContentType: text
                TextContent: |
                  ## Congratulations! You Did It!
                  
                  You have completed the 60-Day Spanish Fluency Accelerator.
                  
                  60 days ago, you could not hold a conversation in Spanish. Now you can.
                  
                  **What You Have Accomplished:**
                  - Mastered essential grammar and vocabulary
                  - Built the habit of daily Spanish practice
                  - Held real conversations with real people
                  - Developed listening skills for native speakers
                  - Created an immersion environment in your daily life
                  
                  **Record Your Day 60 Video:**
                  Remember the 30-second video you recorded on Day 1? Record a new one. Compare them. Share it in the Wins space.
                  
                  **What Is Next:**
                  - Continue your daily immersion practice
                  - Stay active in the community
                  - Find native speakers to practice with regularly
                  - Consider 1:1 coaching for personalized acceleration
                  
                  Your Spanish journey is not over. It is just beginning. But now you have the foundation and the confidence to keep growing.
                  
                  Felicidades!

