  spanish-starter-kit:
    Type: Evolynt::Commerce::Product
    Properties:
      Name: "Spanish Starter Kit"
      ProductType: page
      Description: "100+ essential phrases, pronunciation guide, and daily practice checklist"
      Page:
        Title: "Your Spanish Starter Kit"
        Content: |
          ## Welcome to Your Spanish Starter Kit!
          
          You just took the first step toward conversational Spanish. Here are your resources.
          
          ---
          
          ## Download Your Resources
          
          **[100+ Essential Spanish Phrases (PDF)](https://drive.google.com/your-phrases-pdf)**
          The exact phrases you need for real conversations, organized by situation.
          
          **[Pronunciation Cheat Sheet (PDF)](https://drive.google.com/your-pronunciation-pdf)**
          Master Spanish pronunciation with this visual guide to every sound.
          
          **[Daily Practice Checklist (PDF)](https://drive.google.com/your-checklist-pdf)**
          A simple 15-minute daily routine to build your Spanish habit.
          
          ---
          
          ## Quick Start Video
          
          Watch this 10-minute walkthrough to get the most out of your Starter Kit.
          
          ---
          
          ## How to Use These Resources
          
          1. **Start with the Pronunciation Cheat Sheet** to nail the sounds
          2. **Learn 5 phrases per day** from the Essential Phrases guide
          3. **Follow the Daily Practice Checklist** every morning
          4. **Say everything out loud** - reading silently does not build speaking skills
          
          ---
          
          ## Ready for More?
          
          If you want daily practice partners, weekly group conversation sessions, and an immersion environment, check out the Habla Community.
          
          ---
          
          ## Questions?
          
          Email us at support@hablaespanol.com

